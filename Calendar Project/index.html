<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Project</title>
    <link rel="stylesheet" href="app.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="whole">
        <table class="outline">
        <tr>
         <td colspan="2" class="heading">
            <h3 class="year" id="year">
                 2026
            </h3>
        </td>
        </tr>
       <tbody>
        <tr>
            <td class="day" id="day">Tuesday</td>
            <td rowspan="2" class="day-number"><h1 id="day-number">05</h1></td>
        </tr>
        <tr>
            <td class="month" id="month">April</td>
        </tr>
    </tbody>
    </table>
</div>
</body>
</html>
